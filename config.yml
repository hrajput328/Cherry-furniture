backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "Business Info"
    files:
      - label: "Contact Details"
        name: "contact"
        file: "data/contact.json"
        fields:
          - { label: "Business Name", name: "name", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Opening Hours", name: "hours", widget: "string" }